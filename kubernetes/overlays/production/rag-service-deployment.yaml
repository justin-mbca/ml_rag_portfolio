apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
  namespace: genai-platform
  labels:
    app: rag-service
    environment: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-service
  template:
    metadata:
      labels:
        app: rag-service
        environment: production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: rag-service
          image: ghcr.io/justin-mbca/rag-service:latest
          ports:
            - containerPort: 8002
          env:
            - name: CHROMA_HOST
              value: chroma
            - name: CHROMA_PORT
              value: "8000"
            - name: NEO4J_URI
              value: bolt://neo4j:7687
            - name: NEO4J_USER
              value: neo4j
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: NEO4J_PASSWORD
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rag-service
  namespace: genai-platform
  labels:
    app: rag-service
spec:
  selector:
    app: rag-service
  ports:
    - port: 8002
      targetPort: 8002
  type: ClusterIP
