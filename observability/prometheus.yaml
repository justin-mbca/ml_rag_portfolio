global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:8000"]
    metrics_path: /metrics

  - job_name: ingestion-service
    static_configs:
      - targets: ["ingestion-service:8001"]
    metrics_path: /metrics

  - job_name: rag-service
    static_configs:
      - targets: ["rag-service:8002"]
    metrics_path: /metrics

  - job_name: graph-service
    static_configs:
      - targets: ["graph-service:8003"]
    metrics_path: /metrics

  - job_name: agent-service
    static_configs:
      - targets: ["agent-service:8004"]
    metrics_path: /metrics

  - job_name: neo4j
    static_configs:
      - targets: ["neo4j:2004"]
    metrics_path: /metrics

  - job_name: redis
    static_configs:
      - targets: ["redis:9121"]

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []
